<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ✅ IMPORTANT -->
<title>ReplayTool AI</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
}

/* ✅ VIDEO BACKGROUND FIX */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
}

.container {
    width: 90%;
    max-width: 650px;
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    text-align: center;
    max-height: 90vh;
    overflow: hidden;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
}

.header h1 {
    font-size: 26px;
    margin: 0;
}

/* LOGO */
.logo {
    width: 65px;
    height: 65px;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0, 200, 255, 0.6);
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 100px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px;
    font-size: 14px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.08);
    color: white;
}

textarea:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 10px #3b82f6;
}

/* BUTTON */
button {
    padding: 12px 25px;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    font-weight: bold;
    cursor: pointer;
}

/* LOADER */
.loader {
    margin-top: 15px;
    display: none;
}

.spinner {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* RESULT SCROLL ONLY */
.result {
    margin-top: 20px;
    text-align: left;
    max-height: 250px;
    overflow-y: auto;
    overflow-x: hidden;
}

/* SCROLLBAR */
.result::-webkit-scrollbar {
    width: 6px;
}
.result::-webkit-scrollbar-thumb {
    background: #3b82f6;
    border-radius: 10px;
}

/* REPLY BOX */
.reply-box {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #3b82f6;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* FIX LONG TEXT */
.reply-box span {
    word-break: break-word;
    white-space: pre-wrap;
}

/* COPY BUTTON */
.copy-btn {
    background: #3a9ed4;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    color: white;
    margin-left: 10px;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px) {

    .container {
        padding: 15px;
    }

    .header {
        flex-direction: column;
    }

    .logo {
        width: 50px;
        height: 50px;
    }

    .header h1 {
        font-size: 20px;
    }

    button {
        width: 100%;
    }

    .result {
        max-height: 200px;
    }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bg-video">
  <source src="fbg.mp4" type="video/mp4">
</video>

<div class="container">

    <div class="header">
        <img src="icon.webp" class="logo">
        <h1>AtoZ SmartReplay AI</h1>
    </div>

    <p>Professional Customer Support Reply Generator</p>

    <textarea id="inputText" placeholder="Enter client message..."></textarea>

    <button onclick="generateReply()">Generate Reply</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Generating reply...</p>
    </div>

    <div class="result" id="result"></div>

</div>

<script>
function typeEffect(text, element) {
    let i = 0;
    element.innerText = "";
    const speed = 10;

    function typing() {
        if (i < text.length) {
            element.innerText += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

async function generateReply() {
    const text = document.getElementById("inputText").value;
    const loader = document.getElementById("loader");
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "";
    loader.style.display = "block";

    const loadingTexts = [
        "Analyzing message...",
        "Checking with PSP...",
        "Generating smart reply...",
        "Optimizing tone..."
    ];

    document.querySelector("#loader p").innerText =
        loadingTexts[Math.floor(Math.random() * loadingTexts.length)];

    try {
        const response = await fetch("https://smart-reply-ai-4.onrender.com/api/rewrite", {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: text
        });

        const data = await response.text();
        loader.style.display = "none";

        const lines = data.split("\n").filter(line => line.trim() !== "");

        lines.forEach(line => {
            const div = document.createElement("div");
            div.className = "reply-box";

            const span = document.createElement("span");
            typeEffect(line, span);

            const btn = document.createElement("button");
            btn.innerText = "Copy";
            btn.className = "copy-btn";

            btn.onclick = () => {
                navigator.clipboard.writeText(line);
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy", 1500);
            };

            div.appendChild(span);
            div.appendChild(btn);

            resultDiv.appendChild(div);

            resultDiv.scrollTop = resultDiv.scrollHeight;
        });

    } catch (error) {
        loader.style.display = "none";
        resultDiv.innerHTML = "Error: " + error;
    }
}
</script>

</body>
</html>
